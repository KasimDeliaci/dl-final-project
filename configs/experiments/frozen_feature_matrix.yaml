experiment_matrix:
  id: frozen_feature_matrix
  feature_source: frozen
  classifier: mlp
  selection_metric: validation_macro_f1
  test_policy: audit_only
  fusion_methods:
    - none
    - concat
    - weighted
  planned_backbones:
    - vit_b16
    - swin_tiny
    - deit3_small
  candidate_backbones:
    - beit_base
  selected_forward_backbones_after_e2:
    - vit_b16
    - swin_tiny
    - beit_base
  screened_not_forward_after_e2:
    - deit3_small
  planned_comparisons:
    single_backbone: true
    pairwise_fusion: true
    three_backbone_fusion: true
  sprint2_scope:
    included:
      - single_backbone
    excluded_until_sprint3:
      - pairwise_fusion
      - three_backbone_fusion
  mlp_baseline:
    hidden_dims:
      - 512
      - 256
    dropout: 0.3
    optimizer: adamw
    learning_rate: 0.001
    weight_decay: 0.0001
    early_stopping_patience: 6
    class_imbalance: train_only_class_weighted_cross_entropy
    feature_normalization: StandardScaler fit on train cache only
  status: e2_expanded_fusion_completed
